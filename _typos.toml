[files]
extend-exclude = [
    "*.png",
    "*.wasm",
    "wasm/pkg/",
    "wasm/target/",
    "dist/",
    "node_modules/",
    "package-lock.json",
]

[default.extend-words]
# flate2 is a Rust compression crate name (not a typo for "flat").
flate = "flate"
