version = 1
SPDX-PackageName = "vauchi-web-demo"
SPDX-PackageSupplier = "Mattia Egloff <mattia.egloff@pm.me>"

# License files
[[annotations]]
path = ["LICENSES/**"]
SPDX-FileCopyrightText = "Free Software Foundation"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Lock files
[[annotations]]
path = ["**/Cargo.lock", "**/*.lock", "**/package-lock.json"]
SPDX-FileCopyrightText = "2026 Mattia Egloff <mattia.egloff@pm.me>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Git and editor config files
[[annotations]]
path = [".gitignore", "**/.gitignore", "**/.gitkeep"]
SPDX-FileCopyrightText = "2026 Mattia Egloff <mattia.egloff@pm.me>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# JSON data files (can't have comments)
[[annotations]]
path = ["**/*.json"]
SPDX-FileCopyrightText = "2026 Mattia Egloff <mattia.egloff@pm.me>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Image snapshots (binary, can't have comments)
[[annotations]]
path = ["**/*.png"]
SPDX-FileCopyrightText = "2026 Mattia Egloff <mattia.egloff@pm.me>"
SPDX-License-Identifier = "GPL-3.0-or-later"
