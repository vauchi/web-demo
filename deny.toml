# cargo-deny configuration for vauchi-wasm (web demo)
# https://embarkstudios.github.io/cargo-deny/
#
# Run locally: cargo deny --manifest-path wasm/Cargo.toml check
# Not in CI (no Rust runner in web-demo pipeline; deps are transitively
# covered by core's cargo-deny).

[graph]
targets = [
    "wasm32-unknown-unknown",
]

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # rustls-pemfile is unmaintained — transitive via tungstenite/rustls-native-certs.
    # No fix available until tungstenite updates. Tracked upstream.
    "RUSTSEC-2025-0134",
    # bincode is unmaintained — transitive via uniffi_macros. Cannot remove until uniffi updates.
    "RUSTSEC-2025-0141",
    # paste is unmaintained — transitive via uniffi. No action available.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
allow = [
    "GPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://gitlab.com/vauchi/core.git",
]
