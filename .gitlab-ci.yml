include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/design-drift.yml'
      - '/ci-templates/removed-symbols.yml'

variables:
  SAST_EXCLUDED_PATHS: "dist/, node_modules/, wasm/pkg/, wasm/target/"
  SECRET_DETECTION_EXCLUDED_PATHS: "dist/, node_modules/, wasm/pkg/, wasm/target/"
  SAST_ANALYZER_IMAGE_TAG: "5"

stages:
  - lint
  - build-wasm
  - build-web
  - test
  - security
  - deploy

build:wasm:
  stage: build-wasm
  script:
    - cd wasm
    - wasm-pack build --target web
  artifacts:
    paths:
      - wasm/pkg/
  tags: [linux]
  # TODO: aws-lc-rs (C FFI) can't cross-compile to wasm32-unknown-unknown.
  # Requires crypto backend abstraction (Phase 1 of web-demo completion plan).
  # rusqlite is already gated behind core's `storage` feature.
  allow_failure: true

build:web:
  stage: build-web
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
  tags: [linux]

test:
  stage: test
  script:
    - npm ci
    - npm test
  tags: [linux]

pages:
  stage: deploy
  script:
    - mv dist public
    - |
      curl --silent --fail \
        "${CI_API_V4_URL}/projects/vauchi%2Fscripts/repository/files/scripts%2Fci%2Fgenerate-badges.sh/raw?ref=main" \
        -o generate-badges.sh
      chmod +x generate-badges.sh
    - ./generate-badges.sh public/badges
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  tags: [linux]

# ============================================================
# Security Stage
# ============================================================

semgrep-sast:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "**/*.ts"
          - "**/*.tsx"
          - "**/*.js"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Accessibility (axe-core) — must pass. Hard gate.
test:a11y:
  stage: test
  image: mcr.microsoft.com/playwright:v1.58.2-noble
  script:
    - npm ci
    - npx playwright install --with-deps chromium
    - npm run build
    - npx playwright test tests/playwright/a11y.spec.ts
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Visual Regression (screenshot comparison) — generates baselines on first run.
# Download artifacts to update baselines: glab api projects/vauchi%2Fweb-demo/jobs/JOB_ID/artifacts
test:vrt:
  stage: test
  image: mcr.microsoft.com/playwright:v1.58.2-noble
  script:
    - npm ci
    - npx playwright install --with-deps chromium
    - npm run build
    - npx playwright test tests/playwright/vrt.spec.ts --update-snapshots
  artifacts:
    when: always
    paths:
      - tests/playwright/vrt.spec.ts-snapshots/
      - test-results/
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Design drift: verify all design-spec components are implemented
check:design-drift:
  extends: .design-drift-job
  variables:
    DESIGN_DRIFT_COMPONENT_DIR: "src/core-ui/components"
    DESIGN_DRIFT_FILE_EXT: ".tsx"
    DESIGN_DRIFT_FILE_SUFFIX: "Component"
    DESIGN_DRIFT_CASE: "pascal"

# Removed symbols: detect stale references to removed features
check:removed-symbols:
  extends: .removed-symbols-job
  variables:
    SEARCH_DIRS: "src/ tests/"
