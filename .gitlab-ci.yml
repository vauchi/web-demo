# Pipeline types: MR validation, main post-merge, tags, scheduled security scans.
# This prevents dual-pipeline (branch + MR) and empty-pipeline failures on
# feature branches. Jobs without rules: run on ALL allowed pipeline types.
workflow:
  auto_cancel:
    on_new_commit: interruptible
    on_job_failure: all
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger"

default:
  interruptible: true

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - project: 'vauchi/scripts'
    ref: ci-templates-v2026.07.2
    file:
      - '/ci-templates/design-drift.yml'
      - '/ci-templates/removed-symbols.yml'
      - '/ci-templates/github-mirror.yml'
      - '/ci-templates/vrt-upload.yml'
      - '/ci-templates/verified-fetch.yml'

variables:
  VAUCHI_SCRIPTS_REF: "ci-templates-v2026.07.2"
  SAST_EXCLUDED_PATHS: "dist/, node_modules/, wasm/pkg/, wasm/target/"
  SECRET_DETECTION_EXCLUDED_PATHS: "dist/, node_modules/, wasm/pkg/, wasm/target/"
  SAST_ANALYZER_IMAGE_TAG: "5"

stages:
  - lint
  - build-wasm
  - build-web
  - test
  - security
  - deploy

# Dependency audit gate — blocks MRs on moderate+ npm advisories.
audit:deps:
  stage: lint
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/node:20-slim
  tags: [docker]
  needs: []
  script:
    - npm ci
    - npm audit --audit-level=moderate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

build:wasm:
  stage: build-wasm
  script:
    - cd wasm
    - wasm-pack build --target web
  artifacts:
    paths:
      - wasm/pkg/
  tags: [linux]

build:web:
  stage: build-web
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
  tags: [linux]

test:unit:
  stage: test
  script:
    - npm ci
    - npm test
  tags: [linux]

# Coverage: vitest with v8 provider (main merges only)
coverage:unit:
  extends: .verified-fetch-script
  stage: test
  variables:
    FETCH_SCRIPT_PATH: "scripts/ci/push-coverage.sh"
    FETCH_SCRIPT_OUTPUT: "push-coverage.sh"
    FETCH_SCRIPT_SHA256: "e90b1b5b5afd68ae53b85cc0cf9255062c7ab623fc104c15e9f3d8367846ff1e"
  script:
    - npm ci
    - npx vitest run --coverage --coverage.reporter=cobertura
      --coverage.reportsDirectory=coverage
    - ./push-coverage.sh coverage/cobertura-coverage.xml "web-demo" || true
  coverage: '/All files[^|]*\|[^|]*\s+([\d.]+)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    expire_in: 1 week
  tags: [linux]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

pages:
  extends: .verified-fetch-script
  stage: deploy
  variables:
    FETCH_SCRIPT_PATH: "scripts/ci/generate-badges.sh"
    FETCH_SCRIPT_OUTPUT: "generate-badges.sh"
    FETCH_SCRIPT_SHA256: "063102cf4d70717c267e83e5d81b476db67d73c88760528c38fb03727e1e9720"
  script:
    - mv dist public
    - ./generate-badges.sh public/badges
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  tags: [linux]

# ============================================================
# Security Stage
# ============================================================

semgrep-sast:
  allow_failure: false
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "**/*.ts"
          - "**/*.tsx"
          - "**/*.js"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  allow_failure: false
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Shared Playwright job base — image, runner tag, and the 2-step
# dependency install that all three Playwright jobs need. Extracted
# as part of Phase 3 T3.6 of 2026-04-22-ci-pipeline-health-audit
# so `npm ci` + `npx playwright install` live in exactly one place.
# Consumers add `extends: .playwright-base` and their own build /
# test script — see test:a11y, test:vrt, test:vrt:record below.
.playwright-base:
  stage: test
  image: mcr.microsoft.com/playwright:v1.58.2-noble
  tags: [docker]
  before_script:
    - npm ci
    - npx playwright install --with-deps chromium

# Accessibility (axe-core) — must pass. Hard gate.
test:a11y:
  extends: .playwright-base
  script:
    - npm run build
    - npx playwright test tests/playwright/a11y.spec.ts
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Visual Regression — diff against committed baselines, fail on regression.
# Self-detecting (mirror of macos/ios test:snapshots pattern): if no
# linux-platform baselines exist (e.g. fresh repo or platform mismatch
# from a darwin-only commit), skip with an advisory message instead of
# silently passing. CI is the single source of truth for baselines —
# generate them via test:vrt:record, never with `--update-snapshots`
# inline (which silently regenerates every run and hides regressions).
# Audited 2026-04-22 T2.1.
#
# allow_failure: true retained for now because the existing committed
# baseline is `darwin` only — first record run on linux CI will land
# the linux baselines; flip to blocking after that completes (mirror
# linux-qt/linux-gtk migration pattern).
test:vrt:
  extends: .playwright-base
  variables:
    VRT_PLATFORM: web-demo
    VRT_SCREENSHOT_DIR: tests/playwright/vrt.spec.ts-snapshots
  script:
    - |
      BASELINE_COUNT=0
      if [ -d tests/playwright/vrt.spec.ts-snapshots ]; then
        BASELINE_COUNT=$(find tests/playwright/vrt.spec.ts-snapshots -name '*-linux.png' | wc -l | tr -d ' ')
      fi
      if [ "$BASELINE_COUNT" -eq 0 ]; then
        echo "⚠️  SNAPSHOT BASELINES MISSING — no linux baselines in vrt.spec.ts-snapshots/"
        echo "   Use the 'test:vrt:record' manual job in this pipeline to generate them."
        echo "   CI is the single source of truth — do not record locally."
        echo "   Snapshot validation skipped — no baselines to compare against."
        exit 0
      fi
      echo "✅ Found $BASELINE_COUNT linux snapshot baselines — running validation"
    - npm run build
    - npx playwright test tests/playwright/vrt.spec.ts
  after_script:
    - !reference [.vrt-upload-script, script]
  artifacts:
    when: always
    paths:
      - tests/playwright/vrt.spec.ts-snapshots/
      - test-results/
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Manual: regenerate Playwright VRT baselines on CI and commit them
# to the branch. Mirrors the test:snapshots:record pattern used on
# linux-gtk, linux-qt, macos, ios. PROJECT_ACCESS_TOKEN required.
test:vrt:record:
  extends: .playwright-base
  when: manual
  allow_failure: true
  variables:
    GIT_DEPTH: "0"
  script:
    - npm run build
    - npx playwright test tests/playwright/vrt.spec.ts --update-snapshots || true
    - git config user.name "vauchi-ci-bot"
    - git config user.email "ci@vauchi.app"
    - git add tests/playwright/vrt.spec.ts-snapshots/
    - |
      if git diff --cached --quiet; then
        echo "✅ No baseline changes — nothing to commit"
        exit 0
      fi
      CHANGED=$(git diff --cached --stat | tail -1)
      git commit -m "test: record web-demo VRT baselines [ci]

      ${CHANGED}

      Co-Authored-By: vauchi-ci-bot <ci@vauchi.app>"
      PUSH_URL="https://vauchi-gitlab-runner:${PROJECT_ACCESS_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
      git push "$PUSH_URL" HEAD:${CI_COMMIT_REF_NAME}
      echo "✅ Baselines committed and pushed — verify pipeline will trigger"
  artifacts:
    when: always
    paths:
      - tests/playwright/vrt.spec.ts-snapshots/
      - test-results/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Design drift: verify all design-spec components are implemented
check:design-drift:
  extends: .design-drift-job
  variables:
    DESIGN_DRIFT_COMPONENT_DIR: "src/core-ui/components"
    DESIGN_DRIFT_FILE_EXT: ".tsx"
    DESIGN_DRIFT_FILE_SUFFIX: "Component"
    DESIGN_DRIFT_CASE: "pascal"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "src/core-ui/components/**"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        paths:
          - "src/core-ui/components/**"
          - ".gitlab-ci.yml"

# Removed symbols: detect stale references to removed features
check:removed-symbols:
  extends: .removed-symbols-job
  variables:
    SEARCH_DIRS: "src/ tests/"


# Humble-UI ratchet: block new domain logic / domain vocabulary leaks
# into the view layer (ADR-043 Amendment 6). Snapshot counts are
# tracked in vauchi/scripts; the ratchet may only drop.
lint:humble:
  stage: lint
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/python:3.11-slim
  tags: [docker]
  needs: []
  variables:
    HUMBLE_PY_SHA256: "85583235803f081a5a2cfb01a49b5434dd2c141008e0f53cd6f356f3e9d0cc62"
    HUMBLE_RULES_SHA256: "61914156cb2630494bfc860981d7e7189af2fee7b7deb3bd207392ff8b518ca5"
    HUMBLE_BASELINE_SHA256: "b54146a225a0269b2026ccbce5fb8257010e341c4de97693ceae88487cc656dd"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates coreutils
    - mkdir -p .ratchet-scripts
    - |
      set -euo pipefail
      BASE_URL="${CI_API_V4_URL}/projects/vauchi%2Fscripts/repository/files"
      curl -sf -H "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
        "${BASE_URL}/scripts%2Fhumble_check.py/raw?ref=${VAUCHI_SCRIPTS_REF}" \
        -o .ratchet-scripts/humble_check.py
      curl -sf -H "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
        "${BASE_URL}/scripts%2Fhumble_check_rules.json/raw?ref=${VAUCHI_SCRIPTS_REF}" \
        -o .ratchet-scripts/humble_check_rules.json
      curl -sf -H "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
        "${BASE_URL}/scripts%2Fhumble_check.baseline.json/raw?ref=${VAUCHI_SCRIPTS_REF}" \
        -o .ratchet-scripts/humble_check.baseline.json
      printf '%s  %s\n' "${HUMBLE_PY_SHA256}" .ratchet-scripts/humble_check.py | sha256sum -c -
      printf '%s  %s\n' "${HUMBLE_RULES_SHA256}" .ratchet-scripts/humble_check_rules.json | sha256sum -c -
      printf '%s  %s\n' "${HUMBLE_BASELINE_SHA256}" .ratchet-scripts/humble_check.baseline.json | sha256sum -c -
      chmod +x .ratchet-scripts/humble_check.py
  script:
    - python3 .ratchet-scripts/humble_check.py --repo "${CI_PROJECT_NAME}" --repo-path "${CI_PROJECT_DIR}" --config .ratchet-scripts/humble_check_rules.json --check .ratchet-scripts/humble_check.baseline.json
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "src/**/*.ts"
          - "src/**/*.tsx"
          - "src/**/*.js"
          - "src/**/*.jsx"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

github-mirror:
  extends: .github-mirror
